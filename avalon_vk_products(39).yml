<description>• Светодиодная подсветка морозильной камеры
• Когда вы открываете выдвижные контейнеры морозильника Liebherr, вас радует не только вид продуктов, но и привлекательное освещение. Этому способствуют мощные, долговечные и экологичные светодиоды. Освещение делает обзор содержимого еще проще и в то же время представляет собой необычный элемент дизайна.
• SuperFrost
• Хотите заморозить свежие продукты так, чтобы сохранить витамины? Просто включите режим SuperFrost — и морозильная камера начнет охлаждать интенсивнее. Таким образом, после закладки незамороженных продуктов температура не изменится. Кроме того, SuperFrost — энергосберегающая технология. Если вы не выключите ее вручную, она автоматически отключится через 65 часов.
• TouchControl
• Одним легким касанием можно включить SuperFrost или другие скрытые умные функции, даже не открывая дверь морозильника. TouchControl — это просто и в то же время энергоэффективно.
• VarioSpace
• Во всех морозильниках с технологией NoFrost и SmartFrost выдвижные контейнеры и прозрачные полки вынимаются легко и удобно. Это позволяет использовать все преимущества практичной системы VarioSpace, с которой в морозильнике будет достаточно места для размещения замороженных продуктов большого размера
• FrostProtect
• Не все морозильники устанавливаются в отапливаемом помещении. Некоторые стоят даже на неотапливаемых балкона, верандах или гаражах. Хорошо, что ваш Liebherr наилучшим образом подготовлен к такой прохладной обстановке: ведь все компоненты рассчитаны на температуру окружающей среды до -15 °C и гарантируют работу.
• Элегантная ручка со встроенным толкателем
• Элегантные ручки со встроенными толкателями отличаются прочностью конструкции и удобством при открывании двери.
