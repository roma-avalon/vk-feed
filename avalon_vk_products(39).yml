• Морозильник NORDFROST DF 260NF WAP объемом 105 литров и высоким классом энергоэффективности А+ подходит для быстрой и качественной заморозки, а также длительного хранения пищевых продуктов.
• Морозильник белого цвета с черной интегрированной ручкой и продуманным внутренним пространством станет стильным и технологичным акцентом на вашей кухне. Высота устройства 93,7 см. Для комфортного открытия и установки морозильника в удобном месте — дверь можно перенавесить с правой стороны на левую.
• Устройство обеспечивает высокую производительность с мощностью замораживания до 8 кг в сутки. В случае отключения электричества, морозильник может автономно сохранять температуру до 10 часов. Данная модель имеет ручную систему оттаивания. Для поддержания гигиены и чистоты, а также бесперебойной работы и эффективного процесса охлаждения необходимо время от времени проводить ручное размораживание морозильника.
• Панель управления модели расположена внутри камеры. Откорректировать температуру позволит механический термостат с 3 режимами заморозки, где «1» — самая высокая температура, а «3» — максимально низкая -18°С.
• Морозильник имеет 4 секций для размещения продуктов: 3 выдвижных прозрачных ящика, лоток для ягод и форму для льда. Внутренняя поверхность модели имеет антибактериальное покрытие, которое предотвращает появление неприятных запахов и образование бактерий.</description>
