<description>• Морозильник NORDFROST DF 263 WAP объемом 175 литров и высоким классом энергоэффективности А+ подходит для быстрой и качественной заморозки, а также длительного хранения пищевых продуктов.
• Морозильник белого цвета с черной интегрированной ручкой и продуманным внутренним пространством станет стильным и технологичным акцентом на вашей кухне. Высота устройства 128 см. Для комфортного открытия и установки морозильника в удобном месте — дверь можно перенавесить с правой стороны на левую.
