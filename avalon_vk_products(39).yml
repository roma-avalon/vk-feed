• Панель управления модели расположена внутри камеры. Откорректировать температуру позволит механический термостат с 3 режимами заморозки, где «1» — самая высокая температура, а «3» — максимально низкая -18°С.
• Морозильник имеет 5 выдвижных прозрачных ящиков и форму для льда. Внутренняя поверхность модели имеет антибактериальное покрытие, которое предотвращает появление неприятных запахов и образование бактерий.
