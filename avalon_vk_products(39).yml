• Ультрасовременный морозильник HIBERG i-FR 44G WS с инверторным компрессором и технологией No Frost — идеальное решение для хранения продуктов в вашем доме. Общий объем модели составляет 336 литров, что позволяет удобно разместить все необходимые продукты даже для большой семьи. Высота модели — 190,9 сантиметров.
• Дверь морозильника имеет уникальный дизайн, выполнена из закаленного стекла цвета «белый мрамор». Дверь можно перенавесить с правой стороны на левую. Для легкого открывания в модели предусмотрена функция автооткрытия стуком — необходимо постучать по верхней части поверхности более двух раз, и дверь морозильника приоткроется.
• Общий объем морозильника составляет 336 литров. Система охлаждения работает на двух хладагентах – R600a и R290, что обеспечивает глубокую заморозку большого объема продуктов за короткое время с сохранением их пользы и вкусовых свойств. Мощность замораживания — до 20 кг в сутки. В случае отключения электроэнергии морозильник может автономно сохранять холод до 10 часов.
• Электронная панель управления с цветным LED-дисплеем расположена на двери морозильника. Нажатием на сенсорные кнопки с цветными картинками можно легко выбрать необходимый режим или функцию, а также отрегулировать температуру заморозки. Для защиты от случайного нажатия используется блокировка электронной панели.
• Технологии:
• Инверторный компрессор обеспечивает низкий уровень шума до 38 дБ с минимальным энергопотреблением. Морозильник имеет высокий класс энергоэффективности А++.
• Система охлаждения No Frost с помощью равномерного распределения циркулирующего холодного воздуха позволяет поддерживать стабильную температуру внутри рабочей камеры без образования инея и наледи. Система облегчает уход за устройством и сохраняет полезные свойства продуктов.
• Многопоточная система Air Flow помогает равномерно распределять воздушные пото</description>
