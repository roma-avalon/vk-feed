<description>• Yealink W74H — это стильная современная беспроводная телефонная DECT-трубка нового поколения, предназначенная для ежедневных коммуникаций в бизнес-процессах. Устройство имеет элегантный дизайн, удобно в использовании и рассчитано на большой срок автономной работы. Трубка имеет на борту встроенный Bluetooth 5.1 и разъем 3.5 мм, что позволяет подключить беспроводные Bluetooth-гарнитуры, освобождая руки при использовании зажима для ремня, например, при работе на заводе или на складе. Благодаря вибросигналу пользователь не пропустит важные звонки даже в шумной обстановке.
