• Трубка W74H полностью совместима с базовой DECT-станцией Yealink W70B. Сингл-сотовая система W74Р поддерживает до 10 DECT-трубок, до 10 SIP-аккаунтов и до 20 одновременных вызовов (2 вызова на трубку).
• Кроме того, DECT-трубка W74H полностью совместима с микросотовыми системами Yealink W75 Mini MC, W90/W80, предоставляя пользователям больше вариантов для масштабирования корпоративной беспроводной системы связи.
• Четкая и качественная передача голосовых данных во время вызова обеспечивается благодаря запатентованной технологии шумоподавления FNR (Flexible Noise Reduction). W74H обеспечивает профессиональный качественный звук как в условиях высокой нагрузки, так и при низких показателях параметров сети.
