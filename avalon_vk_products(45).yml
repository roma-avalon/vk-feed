• Комнатный воздух затягивается внутрь AW735 через боковые решетчатые стенки. Сначала он проходит через два фильтра HEPA13+антиформальдегид и очищается от вирусов, бактерий, пыли, аллергенов, неприятных запахов и формальдегида. Затем поступает на пластинчатый барабан, который медленно вращается в поддоне с водой, где насыщается влагой. После этого очищенный и увлажненный воздух поступает обратно в помещение через переднюю решетчатую стенку. Эффективность очистки: CADR 320 м³/ч - 99,97%.
