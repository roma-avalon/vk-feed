<description>• Антибактериальный увлажнитель Xiaomi. Увлажнитель выделяет до 300 мл ультратонких капель воды в час. А благодаря большому резервуару объемом в 4 л увлажнитель воздуха может непрерывно работать до 30 часов без дозаправки.
• Антибактериальная технология с ионами серебра Внутренняя часть резервуара для воды изготовлена из антимикробного материала с ионами серебра с эффективностью 99,9%, что гарантирует чистоту источника воды.
• Вращение на 360° Увлажнитель оснащен вращающимся распылителем, который поворачивается на 360°, обеспечивая охват всего помещения без необходимости постоянного перемещения.
• Практически бесшумный Конструкция с плавающей пластиной увлажняет воздух с минимальным шумом до 38 дБ, гарантируя хороший ночной сон.
• Безопасность Защита от нехватки воды автоматически определяет уровень воды и останавливает увлажнитель.
• Съемная крышка Съемная крышка и конструкция входного отверстия шириной 185 мм позволяют тщательно очистить внутреннюю часть резервуара для воды.
• Диаметр горловины увлажнителя – 14 см, через нее с легкостью пролезет рука для очистки. Кроме того, особая внутренняя конструкция резервуара не имеет труднодоступных мест, где могли бы скрыться бактерии. Сам резервуар можно снять целиком для самой тщательной очистки.
