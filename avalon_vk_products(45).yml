• Увлажнитель-мойка воздуха работает по принципу холодного испарения, используя обычную водопроводную воду. При этом полностью исключено образование белого налёта и конденсата на окружающих предметах. Комнатный воздух затягивается внутрь через боковые решётчатые стенки. Затем поступает на пластинчатый барабан, который медленно вращается в поддоне с водой. На пластинах барабана воздух насыщается влагой, а частицы пыли и аллергенов размером от 10 мкм прилипают к пластинам барабана и оседают в поддоне. После этого очищенный и увлажнённый воздух поступает обратно в помещение через переднюю решётчатую стенку
• Удобное управление
• Настройки включают 5 скоростей работы вентилятора, автоматический режим с возможностью установки желаемой влажности воздуха в диапазоне от 30 до 70 % с шагом 5 %, турборежим, интенсивно очищающий воздух при высоком уровне загрязнения, а также ночной режим с затемнением дисплея и пониженным уровнем шума для комфортного сна
• Индикация
• На дисплее отображаются различные индикаторы: качество воздуха PM2.5, текущая влажность воздуха по данным встроенного гигрометра, уровень воды в приборе (100, 50, 0 %), а также специальные индикаторы «Water», сигнализирующий о необходимости долить воду, и «Service», напоминающий о необходимости профилактической чистки прибора
• Управление с помощью приложения
• Вы можете управлять устройством при помощи приложения SmartLife на вашем смартфоне. Приложение позволяет отслеживать влажность воздуха там, где установлен Venta AeroStyle Сompact, контролировать уровень воды в поддоне прибора, проверять и управлять скоростью работы вентилятора, включать и отключать автоматический и ночной режимы, просмотреть информацию об обслуживании, а также управлять цветом светодиодной подсветки
• Тройная очистка воздуха
• Модель оснащена двумя фильтрами HEPA H13 + антиформальдегид. Каждый фильтр включает в себя: фильтр предварительной очистки для удаления из воздуха крупных частиц загрязнения (предназначен для продления срока службы основного фильтра), фильтр тонкой очистки HEPA H13 для удаления вирусов, бактерий, спор плесени, бытовой пыли, пылевых клещей, пыльцы растений и прочих загрязняющих частиц размером от 0.3 мкм, угольный фильтр для удаления неприятных запахов и формальдегида из комнатного воздуха
• Светодиодная подсветка
• Устройство оснащено LED-подсветкой с регулировкой яркости (от 1 до 8) и возможностью выбора цвета светодио</description>
