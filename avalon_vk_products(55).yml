<description>• Посудомоечная машина с инвертором
• Weissgauff DW 996 Touch Inverter Dual Fan Dry
• Сушка горячим воздухом: Технология Dual Fan dry представляет собой инновационное решение для эффективного удаления влаги с поверхности посуды. Её функционирование основывается на принципе направленного воздушного потока, который под высоким давлением подаётся в сторону уже очищенных изделий. Этот процесс обеспечивает оптимизированное распределение тепла, что способствует быстрому и равномерному испарению воды. В результате значительно сокращается продолжительность полного цикла сушки, что является ключевым фактором для повышения производительности и энергоэффективности в посудомоечной машине.
• Инверторный двигатель, обеспечивающий более экономичное энергопотребление, пониженный уровень шума и оптимизированный расход воды!
• 10 лет гарантии на инверторный двигатель - это живое подтверждение уверенности Weissgauff в качестве выпускаемой нами продукции.
• Цветной дисплей SMART SCREEN с сенсорным управлением отражает всю современность и технологичность подходов Weissgauff к созданию своих устройств, делая процесс взаимодействия с данной моделью ещё более простым и удобным! С легкостью выбирайте любую программу и функцию точно также, как вы это делаете на планшетном компьютере или смартфоне!
• 8 эффективных программ: Умная, Интенсив, Ежедневная, Эко, Экспресс, Бережная, Гигиена, Самоочистка.
• Три корзины, позволяющие разместить отдельно от остальной посуды в верхнем лотке сразу все ложки, вилки и ножи, обеспечивая при этом их наилучшее мытьё!
• Длительное хранение с антибактериальной обработкой даст возможность задать один из 4 интервалов длительного хранения 24, 72, 120 или 168 часов. При настройке этой функции после завершения цикла мойки посудомоечная машина переходит в режим длительного хранения, в котором эффективно удаляются запахи, предотвращается образование влаги на посуде, подавляется размножение бактерий и поддерживается стерильная чистота посуды.
• Умная программа поможет вам, в том случае если вы затрудняетесь с выбором программы мойки. Просто выберите данную программу, и посудомоечная машина, с помощью датчиков и сенсоров самостоятельно определит степень загрязненности вашей посуды и выберет оптимальный температурный режим и интенсивность мытья.
• Программа Интенсив великолепно расправится даже с самыми сложными загрязнениями, гарантируя великолепный результат после каждого запуска!
• Ежедневная программа подойдет для посуды среднего уровня загрязненности сразу после еды в том числе, кастрюль, тарелок и бокалов!
• Экономичная программа подойдет для тех, кто хочет помыть посуду с низким уровнем загрязнений, не расходуя при этом излишне много воды!
• Гигиена это специальная программа стерилизации, повышающая температуру воды до 72°С и устраняющая большинство вредоносных бактерий!
• Экспресс, позволит вам управиться еще оперативнее: всего за 28 минут машина проведет мойку и ополаскивание. Данный режим идеально экономит ваше время и подходит для той посуд</description>
