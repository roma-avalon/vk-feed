• Три корзины, позволяющие разместить отдельно от остальной посуды в верхнем лотке сразу все ложки, вилки и ножи, обеспечивая при этом их наилучшее мытьё.
• Автоматическое открывание дверцы AutoOpen - по окончании цикла позволяет воздуху циркулировать естественным образом, обеспечивая в несколько раз более высокую эффективность сушки, чем у любой другой системы с закрытой дверцей.
• Функция &quot;Луч на полу&quot;, позволяющая определить, завершила ли посудомойка свой цикл работы, не открывая при этом дверцу!
• Режим &quot;Гигиена&quot; представляет собой специализированную программу стерилизации, в рамках которой температура воды повышается до 70 °C, обеспечивая эффективное уничтожение большинства патогенных микроорганизмов, включая бактерии, вирусы и грибки, за счет денатурации их белков, нарушения клеточных структур и способствует значительному снижению инфекционного риска.
• Быстрый режим, позволит вам управиться еще оперативнее: всего за 32 минуты машина проведет мойку и ополаскивание. Данный режим идеально экономит ваше время и подходит для той посуды, которая не требует сушки.
• Режим &quot;Замачивание&quot; эффективно удаляет жир и засохшие остатки пищи. Подойдет для посуды с сильным уровнем загрязненности, в том числе, кастрюль, тарелок и бокалов!
• Режим &quot;Стекло&quot;, прекрасно подойдет для стеклянных стаканов, тарелок, бокалов, фужеров и прочего, обеспечивая одновременно бережное обращение с помещённой посудой и отсутствие разводов на стекле после завершения цикла мойки.
• Интенсивная программа великолепно расправится даже с самыми сложными загрязнениями, гарантируя великолепный результат после каждого запуска!
• Экономичная программа подойдет для тех, кто хочет помыть посуду с низким уровнем загрязнений, не расходуя при этом излишне много воды!
• Вертикальная регулировка средней корзины по высоте, как в загруженном, так и в пустом состоянии, позволит вам буквально на лету изменять внутреннее пространство посудомоечной машины, размещая посуду наиболее эргономичным образом.
• Режим &quot;Самоочистка&quot; представляет собой инновационную систему комплексной очистки посудомоечной машины. Она предназначена для очистки внутренней камеры и системы циркуляции воды для поддержания посудомоечной посуды в чистоте и продления ее срока службы.
• Полностью электронное управление, интуитивно понятное даже человеку, никогда ранее не работавшему с подобной техникой, сделает процесс запуска быстрым и лёгким.
