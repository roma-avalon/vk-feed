• Половинная загрузка , благодаря которой вы сможете помыть даже самое небольшое количество посуды, не расходуя воду и электричество больше, чем это необходимо.
• Панель управления, выполненная в современном дизайне с технологичной светодиодной индикацией, станет изящным и эстетичным решением, дополняющим облик вашей кухни.
• Таймер на 3/6/9 часов , который особенно удобен, если вы ходите начать цикл мытья в ночное время или во время вашего отсутствия. Всего лишь загрузите посуду в камеру, нажмите одну единственную кнопку - и всё остальное машина сделает сама!
• Индикаторы соли и ополаскивателя , всегда напомнят вам, когда нужно дозаправить посудомоечную машину для её эффективной и бесперебойной работы!
• Полностью электронное управление, интуитивно понятное даже человеку, никогда ранее не работавшему с подобной техникой, сделает процесс запуска быстрым и лёгким!
• Настройка уровня звукового сигнала позволит вам установить наиболее комфортный по громкости режим звукового оповещения!
