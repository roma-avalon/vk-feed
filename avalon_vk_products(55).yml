<description>• Отдельностоящая посудомоечная машина с возможностью встраивания Hiberg i-Q 6815 LW шириной 60 см вмещает до 15 комплектов посуды. Стильные кожаные вставки на корпусе посудомоечной машины создают дополнительный эффектный акцент в вашем интерьере.
• Для управления посудомоечной машиной предусмотрена сенсорная цветная панель с большим дисплеем.
• Модель разработана в едином дизайне со стиральной машиной HIBERG I-DDQ10-814 W — для гармоничного пространства и безупречного стиля вашей кухни или прачечной. Встроенный инверторный двигатель обеспечивает надёжность и очень низкий уровень шума — всего 42 дБ.
• Машина практически неслышна в работе и не мешает отдыху. А класс энергоэффективности А+++ помогает экономить электроэнергию, заботясь о семейном бюджете. Три вместительные корзины позволяют легко разместить как мелкую, так и крупногабаритную посуду.
• Одна из корзин регулируется по высоте, чтобы освободить место для кастрюль или высоких бокалов. Встроенная подсветка делает загрузку и выгрузку удобной и приятной.
• Функция автоматического открывания двери уменьшает количество конденсата в посудомоечной машине, способствуя более качественному высыханию посуды и препятствуя возникновению неприятного запаха, а также экономит электроэнергию за счет естественной сушки.
• Выбор зоны мытья позволяет не ждать, пока наберется полная машина – вы сможете включить ее в любой удобный момент, выбрав только одну из корзин.
• Полная защита от протечек AquaStop обеспечит 100% безопасность при эксплуатации даже в случае повреждения шланга. Также в данной посудомоечной машине предусмотрена блокировка от детей.
• Посудомоечная машина оснащена 8 программами: Замачивание 45°С, Комбинированная 60°С, Дезинфекционная 70°С, Эко 50°С, Супер 60°С, Стекло 40°С, Интенсивная 65°С, Уход за машиной.
• Дополнительные опции: Отсрочка запуска, Интенсивность мытья, Выбор зоны мытья, Половинная загрузка, Длительное хранение, Горячая сушка.
