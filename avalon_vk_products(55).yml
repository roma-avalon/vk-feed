<description>• Отдельностоящая посудомоечная машина HIBERG i-Q 6815 LB с возможностью встраивания – это лёгкость и удобство ухода за посудой каждый день. Просторная, стильная и продуманная до мелочей, она бережно справляется со всем объёмом работы, чтобы ваша кухня всегда радовала чистотой и порядком.
• Модель шириной 60 см вмещает до 15 комплектов посуды за один цикл. Даже после большого ужина или семейного застолья у вас не останется лишних хлопот. А благодаря лаконичному современному дизайну техника легко впишется в интерьер любой кухни.
• Тихая и экономичная, как того требует современный дом:
• Встроенный инверторный двигатель обеспечивает надёжность и очень низкий уровень шума — всего 42 дБ. Машина практически неслышна в работе и не мешает отдыху. А класс энергоэффективности А+++ помогает экономить электроэнергию, заботясь о семейном бюджете.
• Вместимость и эргономика:
• Три вместительные корзины позволяют легко разместить как мелкую, так и крупногабаритную посуду. Одна из корзин регулируется по высоте, чтобы освободить место для кастрюль или высоких бокалов. Встроенная подсветка делает загрузку и выгрузку удобной и приятной.
• Идеальный результат в любой ситуации
• Восемь программ обеспечивают бескомпромиссное качество чистоты вашей посуды: «Замачивание 45°C», «Комбинированная 60°C», «Обеззараживание 70°C», «Эко***50°C», «Супер 60°C», «Стекло 40°C», «Интенсивная 65°C», «Уход за машиной». Турбосушка горячим воздухом даёт идеальный эффект просушивания без разводов и капель.
• Дополнительные функции для максимального комфорта
• Функция автоматического открывания двери уменьшает количество конденсата в посудомоечной машине, способствуя более качественному высыханию посуды и препятствуя возникновению неприятного запаха, а также экономит электроэнергию за счет естественной сушки. Благодаря этой функции вам не нужно будет следить за окончанием мойки – приоткрытая дверь станет сигналом к тому, что посуду можно доставать.
• Выбор зоны мытья позволяет не ждать, пока наберется полная машина – вы сможете включить ее в любой удобный момент, выбрав только одну из корзин. Результат по-прежнему будет идеальным, а бонусом вы получите экономию воды и электроэнергии.
• Премиальный дизайн
• Стильные кожаные вставки на корпусе посудомоечной машины HIBERG создают эффектный акцент в вашем интерьере. Модель разработана в едином дизайне со стиральной машиной HIBERG I-DDQ10-814 B — для гармоничного пространства и безупречного стиля вашей кухни или прачечной.
• Для управления посудомоечной машиной предусмотрена сенсорная цветная панель с большим дисплеем.
• Гарантированная безопасность
• Полная защита от протечек AquaStop обеспечит 100% безопасность при эксплуатации даже в случае повреждения шланга. Также в данной посудомоечной машине предусмотрена блокировка от детей.
• HIBERG i-Q 6815 LB — это сочетание высокого качества мойки, стильного дизайна и современных технологий для вашего ежедневного комфорта.
