<description>• Посудомоечная машина Bosch SMS4IMB62Q имеет элегантный корпус в черном цвете подчёркивает современную эстетику и впишется в интерьер любой кухни, где важны сдержанность и стиль. Передняя панель управления выполнена в чёрном оттенке, а открытая компоновка органов управления с удобными кнопками обеспечивает быстрый доступ ко всем функциям. Выдержанные линии и аккуратные пропорции делают прибор визуально лёгким, несмотря на полноразмерные габариты 84,5×60×60 см, а тёмная отделка придаёт ощущение премиальности и практичности в уходе.
• Внутренняя ванна из нержавеющей стали сочетает долговечность и гигиеничность, а продуманная конструкция трёх корзин гарантирует глубокую гибкость при расстановке посуды: верхняя полка оснащена двумя полочками для чашек, а система Rackmatic-3 позволяет менять высоту, подстраивая пространство под крупные предметы. В нижней корзине предусмотрены четыре складных направляющих для тарелок, в верхней — две складные планки, что упрощает размещение нестандартных форм и объёмных приборов.
• Технологичность проявляется в сочетании инверторного мотора EcoSilence Drive и пяти уровней распределения воды, что обеспечивает бережную и тихую работу при уровне шума всего 50 дБ. Проточный нагревательный элемент вместе с системой теплообменной сушки обеспечивает эффективное устранение влаги, а класс сушки A даёт уверенность в качественном результате без дополнительных процедур сушки вручную. Минимальный расход воды — 9,5 л за цикл — подчёркивает экономичность эксплуатации.
• Функциональность модели отражается в наборе программ и режимов: шесть стандартных программ и пять температурных уровней покрывают большинство бытовых задач, а быстрые циклы на 45 °C и 65 °C позволяют сократить время при необходимости. Наличие автоматического режима с AquaSensor оптимизирует расход средств и воды, определяя степень загрязнения, а опция «Моя программа» даёт возможность сохранить любимые настройки. Дополнительно предусмотрены режимы «Экономичная» и «Интенсивная», предварительное ополаскивание и функция половинной загрузки для гибкой работы при разной загрузке.
• Для здоровой обработки предусмотрен режим HygienePlus, обеспечивающий повышенную гигиену, а функция SpeedPerfectPlus ускоряет цикл без существенной потери качества мытья. Система AquaStop и полная защита от протечек с встроенным предохранительным клапаном обеспечивают высокий уровень безопасности, а детская блокировка предотвращает непроизвольное вмешательство. Индикаторы наличия ополаскивателя, соли и времени до завершения программы упрощают контроль процесса.
• Ключевые преимущества:
