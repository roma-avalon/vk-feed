<description>• Влажная уборка без лишних проводов
• Беспроводной вертикальный моющий пылесос КТ-5223 очень удобен при проведении влажной уборки. Благодаря работе от аккумулятора во время использования пылесос не нужно включать в сеть, следовательно, провода не будут мешать под ногами.
• Равномерное распределение воды по полу
• Принцип работы моющего пылесоса КТ-5223 прост: благодаря непрерывному вращению валика турбощётки, подаваемая на него вода равномерно распределяется по поверхности пола, а затем всасывается пылесосом и попадает в резервуар для грязной воды.
• Два режима уборки для разных покрытий
• Кнопка «Режим» циклически переключает режимы работы пылесоса: первое нажатие включает турборежим с усиленной подачей воды на валик турбощётки, второе нажатие включает стандартный режим, во время работы индикатор работы непрерывно горит зелёным.
• База для зарядки и самоочистки
• Нажатие на кнопку «Самоочистка» включает самоочистку. Перед запуском самоочистки убедитесь, что пылесос установлен на базу, в резервуаре для чистой воды есть вода, а резервуар для грязной воды пуст.
• Поролоновый фильтр
• В крышку резервуара для грязной воды установлен поролоновый фильтр с сетчатой крышкой, которые защищают двигатель от попадания мусора и грязи.
• Компактный
• Удлинительная трубка съёмная, поэтому прибор можно разобрать для компактного хранения.
• Компактный, мощный, беспроводной!
• Пылесос компактен, всегда под рукой и готов к работе! Несмотря на габариты, пылесосом удобно управлять и наклонять корпус.
