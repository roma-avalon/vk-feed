<description>• HIBERG STYLLE S — бесшумный моющий пылесос, созданный для тех, кто ценит чистоту, комфорт и эстетику в каждой детали. Он объединяет передовые технологии, лаконичный дизайн и продуманную функциональность, превращая уборку в лёгкий и приятный процесс. Элегантный корпус в чёрном цвете подчёркивает современный стиль модели и гармонично вписывается в любой интерьер.
• HIBERG STYLLE S сочетает функции сухой и влажной уборки, эффективно удаляя пыль, грязь и аллергены за один цикл. В данной модели применена новейшая система с рециркуляцией воды и вращающимся валиком из особого впитывающего материала, который словно губка собирает пыль, волосы и крошки. Пылесос разделяет влажный и сухой мусор, делая очистку максимально удобной и гигиеничной. Такой подход исключает обратный выброс пыли в воздух, заметно снижает уровень шума и создаёт более безопасные условия для аллергиков. Вместительные баки для чистой (450 мл) и грязной воды (500 мл), а также контейнер для сухого мусора объёмом более 185 мл позволяют не прерываться во время уборки
• Вес пылесоса составляет менее 2,8 кг, что делает его невероятно лёгким и манёвренным. Удобная форма и оптимальная высота корпуса позволяют без усилий убирать в узких пространствах и труднодоступных местах, а ручка с возможностью наклона до 180° расширяет диапазон движения, обеспечивая ещё больше свободы и возможностей для тщательной уборки. Интуитивное управление с дисплея и продуманная подставка для хранения делают использование максимально простым
• С уровнем шума всего 45 дБ HIBERG STYLLE S работает почти бесшумно. Его можно использовать поздно вечером, во время детского сна или утреннего кофе — комфорт и тишина останутся неизменными
• Съёмный аккумулятор ёмкостью 2000 мА·ч обеспечивает уборку до 300 кв.м. за один цикл зарядки. Не придется прерываться на подзарядку модели – удобно и практично.
• Ключевые преимущества HIBERG STYLLE S
• Тихая работа — уровень шума всего 45 дБ позволяет убирать в любое время суток, не нарушая покой семьи.
• Функция самоочистки — валик автоматически очищается в базе, избавляя Вас от необходимости контактировать с загрязнениями.
• Лёгкий вес и гибкая ручка — всего 2,8 кг и возможность наклона ручки до 180° обеспечивают максимальную манёвренность и удобство при уборке даже в самых труднодоступных местах.
