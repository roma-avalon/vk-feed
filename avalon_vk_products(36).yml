• Аккумулятор Samsung емкостью 4000 мАч обеспечивает до 40 минут работы в стандартном режиме и до 75 минут* работы в режиме ручного (портативного) пылесоса. Сменный аккумулятор увеличивает как время работы, так и срок службы пылесоса в два раза.
• Время работы:
• До 40 минут в стандартном режиме
• До 75 минут в портативном режиме
• Самоочистка в один клик
• Установите пылесос на базу и запустите режим самоочистки. Щетка начнет вращаться с высокой скоростью, что позволит избавиться от загрязнений и волос. Функция самоочистки избавит вас от необходимости контактировать с загрязненной роликовой </description>
