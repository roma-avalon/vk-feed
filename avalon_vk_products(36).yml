<description>• Помощник для эффективной уборки
• Беспроводной пылесос КТ-5279 очень удобен при оперативной уборке. Благодаря работе от аккумулятора не нужно включать вилку в розетку, провода не мешают под ногами. Поэтому пылесос имеет неограниченный радиус действия: от любого уголка квартиры до машины.
• 2 скорости работы
• Кнопка «Мощность» циклически переключает уровни мощности. Всего у пылесоса 2 уровня мощности. Индикаторы заряда горят во время работы. Чем больше индикаторов заряда горит, тем выше текущий уровень заряда аккумулятора.
• Конструкция «2 в 1»
• Насадка «2 в 1» состоит из ворсовой щетки и щелевой насадки. Ворсовая щётка может использоваться для чистки ковров и ковровых поверхностей, уборки в авто. Щелевая насадка позволит добраться до самых труднодоступных и узких мест.
• Турбощётка с подсветкой для быстрой или генеральной уборки
• Беспроводной пылесос КТ-5279 комплектуется напольной насадкой с турбощеткой, которая помогает качественно справиться с уборкой. Светодиодная подсветка напольной щетки сделает уборку комфортной даже в затемнённых местах.
• Быстрый сброс мусора из пылесборника
• Вместительный контейнер пылесборника ёмкостью 0,8 л легко снимается и моется. В процессе уборки вы можете воспользоваться быстрой очисткой пылесборника. Для этого необходимо просто открыть крышку пылесборника, держа его над мусорным ведром.
• Надёжные фильтры
• Пылесос оборудован современным циклонным фильтром, обеспечивающим хорошую очистку. Внутри пылесборника находится фильтр тонкой очистки и фильтр грубой очистки с металлической сеткой, которые также можно вынуть и почистить.
• Полный комплект
• К пылесосу КТ-5279 прилагаются насадка «2 в 1» и кронштейн для настенного хранения устройства, а также блок питания для зарядки.
