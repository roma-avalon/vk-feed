<description>• Вертикальный беспроводной пылесос Weissgauff V12 BLDC 400 Nero Turbo
• Weissgauff представляет Вашему вниманию новый сверхмощный вертикальный пылесос с циклонной системой фильтрации – которая эффективно разделяет загрязнённый воздух на мусор и очищенный воздушный поток. Более того, он управляется с этим без мешка для сбора пыли. Оснащенный специальной турбощеткой для паркета и ламината с подсветкой зоны уборки, он эффективно удаляет пыль, не повреждая при этом поверхности пола. Инверторный двигатель нового поколения позволит ему справиться даже с самыми сложными загрязнениями! Настенная подставка, идущая в комплекте к данному устройству, позволит грамотно разместить пылесос в комнате, не занимая при этом излишне много места. Удобная съемная рукоятка позволит использовать эту модель и как полноценный вертикальный пылесос, и как портативный независимый блок. А комплект дополнительных аксессуаров лишь дополнительно расширит возможности этого великолепного устройства!
• Турбощетка для ламината и паркета имеет специальное мягкое покрытие из нейлоновой ткани, позволяющее эффективно, но при этом бережно проводить уборку, не повреждая поверхности пола!
• Инверторный двигатель позволяет дополнительно увеличить производительность пылесоса, снизив потери энергии, свойственные поколению традиционных двигателей. Теперь вы уверены, что вся мощь этого великолепного устройства от Weissgauff направлена на то, чтобы обеспечить невероятно высокие результаты уборки!
• Технология SuperSilent обеспечивает сниженный уровень шума - всего 77 дБ, что сделает процесс уборки ещё комфортнее!
• Максимальная мощность 400 Вт это поистине фантастический показатель, обеспечивающий разрежение 27 кПа! Именно такой, по-настоящему мощный двигатель и является сердцем нашего пылесоса, не оставляющим загрязнениям ни единого шанса!
• Четыре различных трансформируемых режима: стандартный вертикальный пылесос, портативный пылесос, пылесос для уборки щелей, пылесос для ухода за мебелью и шторами.
• Пылесборник стаканного типа, с которым вы сможете забыть о тех временах, когда нужно было стирать и чистить сменные мешки после уборки! Простым нажатием кнопки, опорожняйте отсек пылесборника - и он уже снова готов к работе!
• Светодиодная подсветка зоны уборки позволяет легко ориентироваться во время уборки в самых темных углах и под крупной мебелью!
• Настенное крепление, предназначенное для хранения пылесоса во время зарядки, сделает более удобным его размещение в вашем доме!
• Съемный аккумулятор 2000 мАч даст уверенность в том, что пылесос не выключится в процессе уборки в самый неподходящий момент и позволяют им бесконечно продлевать срок службы пылесоса, просто меняя батарейку по мере её износа.
• Богатая комплектация устройства включает в себя основной блок с двигателем, трубка удлинитель, зарядное устройство, электрическую турбощетку для ламината и паркета, гофрошланг, валик-щётку для твердых покрытий, валик-щётку для ковров, насадку для мебели, а также щелевую насадку для уборки трудн</description>
