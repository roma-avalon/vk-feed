<description>• Стильный и мощный циклонный пылесос Domfy DSC-VC704 позволит навести идеальную чистоту в вашем доме. Модель оснащена вместительным пылесборником и двумя моющимися фильтрами тонкой очистки, исключающими проникновение мельчайших частиц пыли за пределы корпуса. Наличие комбинированных щеток позволяет пропылесосить любые напольные покрытия, мебель и бытовую технику.
• Технологичный дизайн. Конструкция пылесоса обеспечивает возможность его быстрой сборки, разборки и обслуживания, а сочетание черного цвета, полупрозрачных темно-красных вставок корпуса и хромированной телескопической трубки обеспечивает стильный и современный внешний вид.
• Мощность всасывания 400 Вт. Создаваемый электродвигателем, мощностью 2 400 Вт, высокоскоростной воздушный поток позволяет извлекать даже глубоко проникшую в обивку мебели и ковровые покрытия пыль.
• Двойная система фильтрации. Два независимых многоразовых HEPA-фильтра создают непреодолимый барьер на пути частиц пыли, содержащихся во всасываемом воздухе.
• Прозрачный пылесборник на 3 л. Объема контейнера для пыли достаточно для уборки нескольких комнат. Благодаря прозрачным стенкам легко отслеживать его наполнение.
• Металлическая трубка-телескоп. Сдвинув специальную клавишу на телескопической трубке, её длину можно отрегулировать в зависимости от выполняемых задач и подстроить под собственный рост.
• Гофрированный шланг 1,5 м. Гибкий шланг, связывающий телескопическую трубку с корпусом, способствует повышению маневренности и позволяет использовать пылесос в ограниченном пространстве.
• Авто-сматывание шнура питания длиной 5 м. Наматывающийся на расположенный в корпусе барабан, шнур питания может выдвигаться на необходимую длину, а после уборки наматывается обратно одним нажатием кнопки.
• Комбинированная насадка для пола. Основная насадка пылесоса оснащена встроенной щеткой, повышающей эффективность чистки ковров. При чистке гладких напольных покрытий её необходимо убрать для лучшего контакта с поверхностью.
• Дополнительная насадка 2 в 1. Щелевая насадка и щетка для мебели в данной модели совмещена в одной, что обеспечивает более удобное хранение и использование.
• Domfy DSC-VC704 – пылесос со сверхмощным двигателем, эффективной системой фильтрации и отличной эргономикой. Крупные колеса и ручка для переноски способствуют его удобному перемещению во время уборки, а комбинация многофункциональных щеток, телескопической трубки и гибкого гофрированного шланга позволяет добраться до самых укромных мест.
