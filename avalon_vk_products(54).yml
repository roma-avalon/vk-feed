• Уникальность линейки SlimLine заключается в многообразии комбинаций характеристик устройства. У покупателя есть возможность подобрать обогреватель в соответствии со своими приоритетными требованиями. Неизменным остаются только надежность, качество, а также удобство монтажа и эксплуатации.
• Учтена эстетическая составляющая и разница вкусовых предпочтений. Линейка SlimLine предлагает покупателю 3 варианта дизайна, каждая из которых представлена в 3 вариантах мощности – серии STYLE Edition, SPORT Edition и Premium Edition.
• Обогреватели SmartWay не только наполнят дом теплом, но и гармонично впишутся в окружающую обстановку.
• Конвекторы серии SPORT Mechanical является электрическими обогревателями конвективного типа. Управление осуществляется через регуляторы на корпусе прибора. Конструкция конвекторов направлена на равномерное распределение тепла для обогрева и с максимальным комфортом. Конвектор работает по принципу естественной конвекции. Холодный воздух, проходя через прибор и его нагревательный элемент снизу вверх, нагревается и выходит сквозь решетки-жалюзи, незамедлительно начиная обогревать помещение. Конструктивные особенности конвекторов исключают возникновение посторонних шумов при нагреве и остывании и гарантируют полную безопасность в эксплуатации. Приборы снабжены кабелем с электрической вилкой длиной 1,5 м. Обогреватели имеют II класс электрозащиты, не требуют специального подключения к электросети. Ножки в комплекте позволяют с легкостью перемещать прибор по всему обогреваемому помещению и ставить его в любом удобном месте. При желании, конвектор можно закрепить на стену.
• Отличительные особенности конвекторов серии SPORT Mechanical:
• Монолитный X-образный нагревательный элемент сроком службы 25 лет;
