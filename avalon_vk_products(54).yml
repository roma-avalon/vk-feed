• Корпус электрического конвектора iVigo произведен из высококачественного холодного стального листа, толщиной 0.8 мм, и усилен рамой, толщиной 1 мм, для придания большей жесткости конструкции.
• Корпус прибора во время работы нагревается не выше 60°С, исключения составляет горячий воздух, выходящий из решеток (температура примерно 90°С). Задняя стенка прибора имеет незначительную температуру нагрева (не выше 50°С), что позволяет вешать его на стену без использования дополнительных экранов.
• Технические характеристики IVIGO EPK4550P05
