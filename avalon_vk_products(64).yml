<description>• Mi Router 4C – компактный роутер от компании Xiaomi
• Внешнее оформление
• Четкие геометрические формы корпуса остались неизменными. Появились приятные закругления торцов, а верхняя крышка стала более изящной, за счет плавного уменьшения к лицевой части и дугообразной выпуклости. Сборка аккуратная, все компоненты смотрятся монолитно.
• На передней панели присутствует брендированное лого и световые индикаторы конекта. На дне – мелкие перфорации – для постоянной циркуляции воздуха. Устройство изготавливается из плотного ABS-пластика белого цвета, с полуматовым напылением, которое сложно поцарапать.
• Интерфейс
• В задней части расположен порт для подключения адаптера, а также блок с:
• 2ХLAN 10/100 Мбит/с Auto MDI / MDIX;
• WAN.
• Mi Wi-Fi Router 4C работает согласно IEEE 802.11n 2,4 ГГц. Гаджет оснащен четырьмя встроенными антеннами одинакового размера. Поворотные механизмы креплений позволяют регулировать положение передатчиков, как по горизонтали, так и по вертикали. Инновационная система двойного усиления сигнала обеспечивает одновременную беспрерывную работу 64 устройств, что весьма удобно, если вы являетесь поклонником умных гаджетов и стремитесь упростить себе жизнь.
• Умный контролер Wi-Fi-сигнала
• За производительность отвечает двухъядерный процессор MT7628DA с 16 Мб оперативной памяти и ускоритель нагрузки Gigabit Wi-Fi 802.11N. Флэш-память отсутствует. Продуктивное взаимодействие структурных элементов, интеллектуальный маршрутизатор и продвинутая система защиты обеспечивают высокоскоростную работу устройства, быстрый отклик и отсутствие задержки пакетных данных. Роутер работает под управлением операционной системы Mi Wi-Fi ROM.
• Характеристика канальных скоростей:
• MCS0-MCS15 11Mbps ≤ -90dBm
• 54 Mbps ≤ -72dBm
• HT20 MCS7 ≤-69dBm
• HT40 MCS7 ≤-66dBm
• Кодировки доступа прошлой версии поменялись на MIOT fast Wi-Fi. Новинка позволяет избирательно отсеять незнакомые устройства и запретить им доступ, вплоть до сокрытия точки доступа. Присутствует черный список, куда просто внести нарушителей, мониторинг попыток вторжения, фильтрация URL (контент-фильтр) и IP-адресов.
