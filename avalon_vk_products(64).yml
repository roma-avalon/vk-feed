• Питание и передача данных осуществляются по одному кабелю через технологию PoE (Power over Ethernet). Это кардинально упрощает процесс инсталляции, поскольку отпадает необходимость в прокладке отдельного электрического кабеля к месту установки устройства. В комплекте вы найдете все необходимое для быстрого старта: инжектор PoE и адаптер питания. Такой подход минимизирует затраты на развертывание и позволяет легко перемещать точку доступа при изменении сетевой топологии.
