<description>• Каждый модуль системы является мощным универсальным устройством, созданным по современному стандарту Wi-Fi 6. Он работает одновременно в двух частотных диапазонах — 2,4 ГГц и 5 ГГц, что позволяет гибко распределять нагрузку. На частоте 2,4 ГГц достигается скорость до 574 Мбит/с, идеальная для подключения многочисленных умных устройств. А на высокоскоростной частоте 5 ГГц вы получите потрясающие 2402 Мбит/с для потокового видео, онлайн-игр и работы с облачными хранилищами. Суммарная беспроводная скорость системы составляет впечатляющие 2976 Мбит/с, чего с избытком хватит для самой активной цифровой жизни.
• Один из ключевых модулей выполняет роль основного шлюза. Он оснащён высокоскоростным сетевым портом WAN формата RJ-45 с пропускной способностью 2,5 Гбит/с. Это означает, что вы сможете в полной мере использовать возможности даже самого быстрого оптоволоконного подключения от вашего провайдера. Для проводного соединения с одним устройством, таким как стационарный компьютер или медиасервер, предусмотрен порт LAN на 1 Гбит/с. Благодаря встроенной поддержке IPTV вы легко организуете просмотр цифрового телевидения без нагромождения лишних проводов.
• Мощность и стабильность сигнала обеспечиваются пятью внутренними антеннами в каждом блоке и передовой технологией MU-MIMO. Эта система позволяет одновременно обмениваться данными с множеством устройств без снижения скорости и задержек. Зона уверенного приёма простирается до 220 метров на открытом пространстве, а в условиях типовой жилой застройки три модуля эффективно покроют всю площадь, создавая единую сеть без «мёртвых» зон. Вы будете плавно перемещаться по дому, а система будет незримо и моментально переподключать ваши гаджеты к самому сильному сигналу.
• Безопасность вашей сети является приоритетом. Система поддерживает все современные протоколы шифрования, включая WEP, WPA, WPA2 и новейший WPA3, обеспечивающий максимальную защиту от несанкционированного доступа. Встроенный межсетевой экран с функцией Stateful Packet Inspection (SPI), поддержка Network Address Translation (NAT) и возможность создания демилитаризованной зоны (DMZ) предоставляют полный контроль над сетевым трафиком. Для безопасного доступа к корпоративным ресурсам реализована поддержка различных протоколов виртуальных частных сетей, таких как IPSec, L2TP и PPTP.
• Гибкость настройки под любые потребности — ещё одно достоинство Cudy M3000. Система поддерживает режим моста, что позволяет расширять существующую сеть. Функция WISP даёт возможность организовать беспроводное подключение к интернету там, где нет возможности провести кабель. Вы можете легко настроить гостевую сеть для посетителей, не раскрывая пароль от своей основной сети. Управление всеми этими функциями интуитивно понятно и осуществляется через веб-интерфейс. Надёжная работа обеспечивается солидным объёмом оперативной памяти в 256 МБ и флэш-памяти в 128 МБ. Поддержка статической маршрутизации, сервера Dynamic DNS и современного протокола IPv6 делает эту систему готовой </description>
