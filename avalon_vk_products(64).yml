<description>• Для требовательных пользователей критически важна скорость проводного подключения. Mercusys MR37BE оснащен современными портами, включая WAN и один из LAN-портов с пропускной способностью 2.5 Гбит/с. Это гарантирует, что вы сможете на 100% использовать высокоскоростной оптоволоконный интернет без узких мест, а также создать сверхбыстрое проводное соединение для игровой консоли, NAS-накопителя или мощной рабочей станции. Два дополнительных гигабитных LAN-порта обеспечат стабильность для других проводных устройств.
• Безопасность вашей сети и данных является приоритетом. Маршрутизатор защищен шифрованием WPA3, а также поддерживает WPA и WPA2, обеспечивая максимальную защиту от несанкционированного доступа. Встроенный межсетевой экран (FireWall) с технологией Stateful Packet Inspection (SPI), функцией DMZ и статической маршрутизацией надежно охраняет вашу внутреннюю сеть от внешних угроз из интернета. Для удобства работы с сетевыми сервисами роутер поддерживает Dynamic DNS, имеет DHCP-сервер и полную совместимость с IPv6.
• Mercusys MR37BE предлагает продвинутые функции для тонкой настройки под ваши нужды. Поддержка IPTV позволяет легко настроить цифровое телевидение без покупки дополнительного оборудования. Функция гостевой сети поможет предоставить доступ к интернету вашим друзьям, изолировав их от ваших основных устройств и данных. Для безопасного удаленного доступа к домашней сети реализована поддержка VPN-протоколов, включая L2TP и PPTP.
• Mercusys MR37BE — это больше чем маршрутизатор, это центральный хаб вашего умного дома, рассчитанный на будущее. Он effortlessly справляется с растущим количеством устройств — смартфоны, ноутбуки, умные колонки, камеры видеонаблюдения и многое другое будут работать одновременно безупречно и без малейших торможений. Это инвестиция в безупречное цифровое будущее вашего дома уже сегодня
