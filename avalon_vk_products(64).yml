<description>• Wi-Fi 6 Mesh система - это новый уровень беспроводного интернета в вашем доме. Она состоит из одного или нескольких совместно работающих роутеров, создающих единое бесшовное интернет покрытие. Вы не будете терять сигнал при переходе из комнаты в комнату или на другой этаж. Wi-Fi 6 Mesh система подключает все ваши устройства к интернету от провайдера и обеспечивает высокую скорость и надёжность соединения. Благодаря Mesh технологии вы больше не столкнётесь с проблемой слабого сигнала в отдалённых уголках. Каждый роутер М1800 работает на площади до 185 кв.м. Вам нужна большая площадь бесшовного покрытия? Просто добавьте ещё один или два Mesh роутера Cudy М1800 в вашу систему, наращивая покрытие до 360 кв.м. или до 510 кв.м.
• Cudy M1800 - это продвинутая система Wi-Fi 6 Mesh, которая обеспечивает плавную передачу видео в высоком разрешении или скоростную онлайн-игру на большем количестве подключенных устройств одновременно. Стандарт АX1800 поддерживает скорость Wi-Fi 6 до 1,8 Гбит /сек (до 1201 Мбит/сек на 5 ГГц + до 574 Мбит/сек на 2,4 ГГц). Поднимает производительность и эффективность вашей сети, поддерживает до 100 подключенных Wi-Fi устройств без снижения скорости обмена данными в режиме реального времени (так, одновременно могут быть подключены до 3 устройств быстрой загрузки данных, до 5 устройств видеотрансляции в высоком разрешении 4К, до 15 камер наблюдения, до 20 устройств видеотрансляции в разрешении HD 720P, до 25 устройств «умного дома», до 30 устройств доступа к web страницам).
• Модель Cudy M1800 (3-Pack) имеет в комплекте 3 шт роутеров Cudy М1800 с гигабитными портами Ethernet стандарта Wi-Fi 6 Mesh AХ1800.
• Поддерживается технология бесшовного роуминга, которая помогает вам автоматически переключать ваше устройство на самый сильный Wi-Fi сигнал при перемещении из одной комнаты в другую, в том числе перемещаясь между этажами в загородном доме, избегая необходимости ручного переключения между сетями. Для городских многоэтажек применение Mesh становится всё более актуально тем, что сети соседей больше не будут мешать высокой скорости подключения ваших устройств в системе Mesh, переход на оптимальную частоту с самым сильным сигналом связи с вашим роутером происходит автоматически.
• Стандарт Wi-Fi 6 использует OFDMA для повышения пропускной способности и эффективности вашей сети, поэтому большое количество устройств может одновременно подключаться без замедления работы Wi-Fi.
• Wi-Fi 6 Mesh роутер Cudy M1800 имеет два гигабитных порта Ethernet 10/100/1000 Мбит/сек и четыре внутренние всенаправленные антенны для стабильной связи со всеми подключенными устройствами. Поддерживает MU-MIMO, Beamforming, WPA3. Благодаря встроенному VPN-клиенту PPTP / L2TP / OpenVPN / Wire Guard/ IPSec/Zeroiter этот маршрутизатор может легко установить соединение с VPN-сервером для передачи всех ваших онлайн-данных и трафика, и вы можете настроить его защиту с помощью шифрования и DNS через TLS одновременно для надёжной защиты вашего интернет-трафика. Роут</description>
