• Описание Wi-Fi 6 Mesh система - это новый уровень беспроводного интернета в вашем доме. Она состоит из одного или нескольких совместно работающих роутеров, создающих единое бесшовное интернет покрытие.
• Вы не будете терять сигнал при переходе из комнаты в комнату или на другой этаж. Wi-Fi 6 Mesh система подключает все ваши устройства к интернету от провайдера и обеспечивает высокую скорость и надёжность соединения. Благодаря Mesh технологии вы больше не столкнётесь с проблемой слабого сигнала в отдалённых уголках. Каждый роутер М1800 работает на площади до 185 кв.м.
