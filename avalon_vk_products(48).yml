<description>• Электрический водонагреватель NORDFROST DDV 100 c объемом бака 100 литров, высокой мощностью 2000 Вт, электронным управлением и сухим ТЭНом обеспечит максимальный комфорт и высокую эффективность нагрева воды на протяжении всего срока эксплуатации.
• Современный дизайн и передовые технологии делают водонагреватель NORDFROST идеальным решением для вашего дома. Благодаря компактному корпусу и вертикальной форме его можно установить в любом удобном месте.
• Водонагреватель оснащен нагревательным элементом «сухого» типа (Сухой ТЭН). Это предполагает отсутствие прямого контакта между нагревательным элементом и водой. Сухой ТЭН гарантирует высокую производительность и длительный срок службы, не требуя особого ухода.
• Электронная панель управления водонагревателя представлена дисплеем, двумя регуляторами и индикаторами сети и нагрева. Удобное управление с помощью двух регуляторов дает возможность устанавливать необходимую температуру и мощность нагрева, а встроенный термостат позволяет точно и надежно поддерживать заданную температуру. Регулятор мощности имеет 3 режима: 800, 1200 и 2000 Вт.
• Температура в водонагревателе поддерживается автоматически. Когда температура воды внутри ЭВН достигает заданного значения, нагрев автоматически выключается и водонагреватель переходит в режим поддержания тепла. При снижении температуры: водонагреватель автоматически включается для восстановления тепла. Регулируемый диапазон температуры воды: от 30 до 75°C.
• Благодаря прямому подключению к водопроводу нет необходимости контролировать уровень воды в баке.
• Водонагреватель имеет многоуровневую систему защиты:
• - устройство защитного отключения (УЗО) на электрическом шнуре обеспечивает отключение ЭВН от сети электропитания при утечке;
• - защита от включения без воды;
• - защита от перегрева;
• - защита от избыточного давления.
• Внутренний бак покрыт высококачественной эмалью для защиты от коррозии и образования накипи.
• Нагревательные элементы защищены от контакта с водой кожухом из сплава Incoloy 840 с повышенным содержанием антикоррозионных легирующих элементов хрома и никеля, что гарантирует безупречную эксплуатацию и увеличивает срок службы устройства. При необходимости замена нагревательного элемента осуществляется просто – без слива воды.
• Для эффективной теплоизоляции приборов использован 20 миллиметровый слой вспененного полиуретана. Этот экологически чистый и безопасный материал позволяет сохранять температуру до 24 часов и экономить электроэнергию.
