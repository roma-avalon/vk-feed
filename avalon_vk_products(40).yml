<description>• Классический дизайнДизайн ретро моделей микроволновых печей обладают не только одинаковым цветом, но и идентичными аксессуарами вместе с духовыми шкафами своей серии. Теперь в Körting есть полноценный комплект духового шкафа и микроволновой печи в ретро дизайне, который позволяет устанавливать их в кухонной мебели друг под другом.
• ГрильВ микроволновых печах Korting установлен гриль. Гриль — это способ приготовления пищи с помощью нагревательного элемента. При этом пища приобретает красивую, румяную, поджаристую корочку. С помощью этой функции можно, например, приготовить курицу-гриль с хрустящей корочкой или подрумянить говяжий стейк.
• Автоматические программыЗаданные программы позволяют выбрать один из наиболее подходящих режимов работы в зависимости от типа блюда. После выбора программы пользователю достаточно выбрать соответствующий вес или объем, печь самостоятельно подберет время работы и мощность нагрева, вам остается немного подождать и достать вкусно приготовленное блюдо.
• Автоматическая разморозкаВ микроволновых печах Korting предусмотрен режим «автоматическая разморозка». С этой функцией вам не придется подсчитывать, сколько времени потребуется для разморозки того или иного продукта и какую мощность устанавливать - СВЧ-печь все сделает сама.
• Быстрый стартСпециальная кнопка «Быстрый старт», поможет вам запустить микроволновую печь на максимальной мощности на 30 секунд, что позволит одним нажатием разогреть небольшое количество еды, при необходимости нажмите на кнопку еще раз. Теперь даже ребенок быстро и удобно сможет разогреть свой обед!
• Функция «Защита детей»Управление прибором можно заблокировать, для обеспечения безопасности детей в доме. С заблокированной панелью управления, ваши дети не смогут воспользоваться микроволновой печью, вы можете быть спокойны, что ни чего страшного не произойдет.
