• Поворотный стол диаметром 345 мм не только обеспечивает равномерный прогрев блюда со всех сторон, но и удобно извлекается из камеры, делая легкими его очистку и уход
• Конвекция сделает разогрев и приготовление блюд ещё эффективнее, обеспечивая интенсивное нагнетание и циркуляцию горячего воздуха в камере микроволновой печи!
• Камера из нержавеющей стали воплощает в себе надежность и качество, ведь её стенки прочные, устойчивые к перепадам температур и механическим воздействиям, а также легко отмываются от возникающих загрязнений
• Автоменю на 10 программ открывает по-настоящему богатые возможности по настройке вашей микроволновой печи под требуемые особенности продуктов.
• Встроенный гриль - позволит готовить вам аппетитное мясо, рыбу или овощи, поджаренные до хрустящей корочки!
• Комбинированные режимы - при которых микроволны и гриль работают вместе, дополняя друг друга, открывают еще больше возможностей по приготовлению в данном устройстве!
• Разморозка по весу - позволит подготовить замороженные продукты к дальнейшему приготовлению, обеспечивая равномерный результат без перегретых краев или непроработанных участков внутри.
• Блокировка от детей, благодаря которой вы всегда сможете избежать ненужных нажатий на элементы управления, например, во время уборки микроволновой печи или, чтобы предотвратить её незапланированное включение детьми.
• Сенсорный блок управления это настоящая гордость Weissgauff, ведь он не только является интуитивно понятным, но и великолепно реагирует на прикосновения с первого нажатия даже в том случае, если ваши руки влажные или прохладные
• Удобный цифровой дисплей с крупной индикацией позволит сделать процесс взаимодействия с микроволновой печью еще более комфортным и простым
• Дизайн, выполненный в закаленном стекле, станет финальным штрихом в совершенстве великолепного облика этой модели. Каждый раз, взаимодействуя с вашей микроволновой печью от Weissgauff, вы будете чувствовать, что это не только функциональное устройство, но и настоящее украшение вашей кухни!
•</description>
