<description>• Innova RTB – серия однофазных источников бесперебойного питания с двойным преобразованием или онлайн и синусоидальной формой выходного напряжения. Надёжно обеспечивает защиту чувствительного оборудования от наиболее распространенных проблем с питанием, включая сбои, провалы и скачки напряжения, линейный шум, высоковольтные импульсы, колебания частоты, переходные процессы при переключении и гармонические искажения.
• Особенности:
• Однофазный ИБП с двойным преобразованием входного напряжения
• Синусоидальная форма выходного напряжения
• Коэффициент выходной мощности – 0,9
• Входной автоматический выключатель
• Защита от короткого замыкания, перегрузки и высоковольтных выбросов
• Режим ECO для экономии энергии
• Разъем аварийного отключения EPO
• ROO – разъем дистанционного включения и выключения
• Слот для подключения SNMP карты для удаленного управления и мониторинга по сети
• USB и RS-232 порты для связи с компьютером
• Возможность увеличения времени автономной работы при подключении дополнительных батарейных модулей (приобретаются дополнительно)
• Поворотный ЖК-экран для отображения информации режиме работы, состоянии нагрузки, событиях, измерениях и настройках и переключения рабочих режимов
• Совместимость с генераторами
• Установка в 19” стойку с помощью дополнительного комплекта для монтажа (2U)
• Внутренние аккумуляторы в комплекте
• Однофазный источник питания Innova RTB 2000 мощностью 2000 ВА полностью устраняет опасности, связанные с нарушением электропитания и защищает ваше оборудование от нарушений электропитания, таких как короткое замыкание, перегрузки, высоковольтные выбросы, шум в сети, переходные процессы напряжения и перебои в подаче электроэнергии. В случае исчезновения напряжения во внешней сети ИБП перейдет на питание от внутренних аккумуляторных батарей, время переключения – 0 мс.
• Модель проста в вводе в эксплуатацию, эксплуатации и обслуживании. Корпус выполнен из металла, передняя панель пластиковая. Управление и настройка Innova RTB осуществляется с помощью механических кнопок и информационного ЖК-экрана с подсветкой. На экране отображается текущий режим работы, уровень заряда батарей и мощность подключенной нагрузки, напряжение и частота.
• Для увеличения времени батарейной поддержки к ИБП можно подключить дополнительные батарейные модули. Максимально можно подключить 2 внешних батарейных модуля.
• Программное обеспечение PowerMaster+ предназначено для управления и мониторинга: контролирует автоматические отключения, запланированные отключения и уведомления для компьютеров, работающих от ИБП (источник бесперебойного питания).
• ИБП серии Innova RTB рекомендуются для защиты:
• локальных периферийных центров обработки данных и серверных
• мощных серверов, в том числе установленных в стойки;
• периферийной компьютерной и вычислительной техники;
• любого телекоммуникационного оборудования (офисные АТС, роутеры, маршрутизаторы, модемы и т.п.)
• систем связи
• систем безопасности
• банкоматов
• кассовых терминалов
• Комплек</description>
