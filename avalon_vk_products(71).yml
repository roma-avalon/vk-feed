<description>• ИБП серии On-line ExeGate PowerExpert обеспечивают на выходе синусоидальное напряжение строго правильной формы (pure sine wave), что делает их идеальным решением для электропитания компьютерного, медицинского и иного, требовательного к качеству питающего напряжения и содержащего различные электроприводы оборудования. Встроенный стабилизатор напряжения гарантирует работу устройства в широком диапазоне входного напряжения, а наличие всех видов защиты (от короткого замыкания, перегрева, перезаряда и т.д.) гарантирует надежность, безопасность и долговечность устройства.
• Обращаем Ваше внимание на то, что при работе ИБП в режиме «от сети» происходит непрерывное измерение входного напряжения, и, при необходимости, выполняется его корректировка. Если напряжение в сети ниже 198В, то происходит его повышение. Если напряжение в сети выше 242В, то происходит его понижение. Если напряжение сети находится в пределах 198В…242В, то напряжение не корректируется, так как оно соответствует требованиям ГОСТ, и, соответственно, значения входного и выходного напряжения на цифровых индикаторах будут одинаковы.
