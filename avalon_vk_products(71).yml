<description>• Представляем источник бесперебойного питания Systeme Electric SRTSE2000RTXLIG1 — надежное и интеллектуальное решение для защиты критически важного оборудования от любых проблем в электросети. Этот прибор обеспечивает не просто резервное питание, а создает идеальную среду для работы ваших серверов, телекоммуникационных систем, сетевого и медицинского оборудования.
• В основе устройства лежит технология двойного преобразования, или онлайн-режим. Это означает, что поступающее сетевое напряжение постоянно преобразуется в постоянный ток, а затем обратно в идеально стабильное переменное напряжение. Таким образом, ваша техника полностью изолирована от всех внешних помех, скачков и провалов напряжения. Ключевое преимущество — мгновенное, за нуль миллисекунд, переключение на работу от встроенных аккумуляторов при пропадании внешнего питания, что абсолютно исключает даже малейший перерыв в электропитании.
• Мощность устройства составляет 2000 вольт-ампер полной и 2000 ватт активной мощности, что позволяет подключить несколько единиц оборудования одновременно. Для этого предусмотрено девять выходных розеток стандартов IEC 320 C13 и C19. Выходной сигнал имеет чистую синусоидальную форму, которая необходима для корректной работы чувствительной электроники. Высокий коэффициент полезного действия в 91 процент делает работу экономичной, а входной коэффициент мощности 0.99 минимизирует нагрузку на сеть.
• Прибор обладает интеллектуальной системой стабилизации напряжения, которая без перехода на батареи корректирует повышенное или пониженное входное напряжение в широком диапазоне от 110 до 300 вольт. Когда же система переходит в автономный режим, она обеспечивает исключительную стабильность выходного напряжения с отклонением не более одного процента и точность частоты 50 или 60 герц с погрешностью всего 0.1 герц.
• Конструкция выполнена в форм-факторе для монтажа в стандартную серверную стойку высотой всего 2 юнита. Управление и мониторинг удобны благодаря информативному жидкокристаллическому экрану и комплекту интерфейсов, включающему RS-232 и USB. Наличие слота для дополнительных плат, например, для сетевого управления по протоколу SNMP, и сухих контактов для интеграции в системы сигнализации делает устройство гибким инструментом в любой инфраструктуре.
• Отдельного внимания заслуживает модуль аккумуляторов. Он имеет емкость 9 ампер-часов и напряжение 12 вольт, поддерживает возможность подключения внешних батарейных блоков для увеличения времени автономной работы и позволяет производить горячую замену батарей без отключения нагрузки, что критически важно для непрерывности работы. Все системы защищены от перегрузок, коротких замыканий и высоковольтных импульсов, а встроенные фильтры эффективно подавляют помехи. Надежность работы дополняется функцией холодного старта, автоматическим байпасом и автоматическим предохранителем.
