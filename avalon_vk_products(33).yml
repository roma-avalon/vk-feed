<description>• Стирально-сушильная машина Bosch WNA13401PL из серии Serie 4 - это отдельностоящая модель с фронтальной загрузкой, которая сочетает в себе функции стирки и сушки. Благодаря вместительности барабана в 8 кг для стирки и 5 кг для сушки, машина идеально подходит для больших семей и тех, кто ценит комфорт и экономию времени. Модель обладает максимальной скоростью отжима 1400 оборотов в минуту, что обеспечивает эффективное удаление воды из белья. Многофункциональный LED-дисплей и интуитивно понятные элементы управления делают использование машины удобным и простым. Поворотный переключатель и сенсорные кнопки позволяют легко выбирать программы и настройки.
• Машина оснащена 14 программами стирки, включая предварительную стирку, стирку хлопка, синтетики, смешанного белья, деликатного белья, шерсти и спортивной одежды. Присутствует также функция быстрой стирки Super 15/30 и режимы сушки по времени. Это делает эту модель универсальной для любого типа белья. Особенностью машины является технология VarioPerfect: SpeedPerfect, которая позволяет сократить время стирки или увеличить эффективность стирки. Контроль пенообразования и подавление дисбаланса при отжиме обеспечивают стабильность работы машины и качественный результат. Функция Iron Assist помогает облегчить глажку после стирки.
• Внутренний барабан изготовлен из нержавеющей стали, что обеспечивает долговечность и надежность машины. Эффективный инверторный двигатель EcoSilenceDrive гарантирует тихую и экономичную работу. Дизайн AntiVibration снижает вибрацию и шум при работе, делая использование машины еще более комфортным.
• Модель имеет класс энергопотребления A++, что подтверждает ее энергоэффективность. Классы эффективности стирки и отжима C и B соответственно гарантируют качественную стирку и отжим. Защита от протечек AquaStop и автоматическая блокировка загрузочного люка обеспечивают безопасность использования. Отложенный старт до 24 часов позволяет запланировать стирку на удобное время. Блокировка от детей предотвращает случайное включение или изменение настроек. Компактные размеры машины и белый цвет делают ее идеальным дополнением к любому интерьеру.
