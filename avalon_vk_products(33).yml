• Класс энергопотребления: A.
• Класс стирки: A.
• Уровень шума: Низкий.
• Преимущества:
• Компактность: Идеально подходит для небольших пространств, дач, общежитий или съёмного жилья. Габариты 41,7 см x 64,4 см x 37,2 см (ШхВхГ) и вес всего 8,5 кг обеспечивают лёгкую транспортировку и установку.
• Автономность: Не требует подключения к системе водоснабжения, что позволяет использовать её в местах с отсутствием центрального водопровода.
• Простота управления: Механическое управление с одним таймером делает использование максимально надёжным и интуитивно понятным для любой возрастной группы.
• Экономичность: Высокие классы энергопотребления (A) и стирки (A) при быстрой стирке.
• Надёжность: Корпус из первичного пластика устойчив к внешним воздействиям.
• Габариты: 41,7х64,4х37,2 см (ШхВхГ)</description>
