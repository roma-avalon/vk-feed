<description>• Стиральная машина Haier HW50-BP1026 с фронтальным типом загрузки оборудована барабаном Pillow объемом 32 л. Отверстия в виде подушечек обеспечивают мягкое воздействие на ткань, исключают порчу вещей и гарантируют бережное устранение стойких загрязнений. Максимальный вес сухого белья составляет 5 кг. Устройство оснащено инверторным двигателем, благодаря чему уровень шума при стирке не превышает 49 дБ, при отжиме - 67 дБ. Класс энергопотребления составляет А+++. У модели предусмотрено 12 автоматических программ с предустановленными параметрами, в том числе «Гигиеническая», «Быстрая», Пуховые вещи».
• Стиральная машина Haier HW50-BP1026 имеет возможность дозагрузки белья во время цикла и опцию обработки паром, что позволяет освежать вещи без использования средств для стирки. В памяти устройства можно сохранить выбранные настройки. Дверца после начала стирки блокируется автоматически. У люка имеется антибактериальная манжетка, которая исключает размножение бактерий и появление неприятного запаха. Технология автовзвешивания определяет количество одежды, загруженной в барабан, и выбирает оптимальный объем воды.
