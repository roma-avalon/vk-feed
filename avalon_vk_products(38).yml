<description>• Кухонная плита Gorenje GK5C40WF белый
• Функция «Пицца»
• Эта программа с регулировкой температуры до 300°C специально разработана, чтобы вы могли дома выпекать идеальную пиццу, фокаччу, лепешки и подобную выпечку.
• FrozenBake
• Быстрое приготовление замороженных продуктов
• Эта эффективная программа идеально подходит для приготовления любых замороженных продуктов и полуфабрикатов.
• Сводчатая форма HomeMade
• Духовки OptiBake в плитах Gorenje известны своей инновационной формой внутренней камеры, которая стала их визитной карточкой. Сводчатая форма HomeMade создана по подобию традиционной дровяной печи и обеспечивает более эффективную циркуляцию воздуха по сравнению с другими продуктами на рынке. Теперь мы обновили форму HomeMade, и циркуляция воздуха дополнительно улучшилась благодаря новой конструкции нагревательных элементов и новому расположению отверстий подачи воздуха. Это обеспечивает одинаковую температуру по всему пространству духовки. Ваши блюда больше не будут подгоревшими с одной стороны и недоготовленными — с другой.
• Технология MultiAir
• Технология MultiAir обеспечивает оптимальную циркуляцию горячего воздуха в духовке. Продуманное расположение отверстий MultiAir на задней стенке, сводчатая форма духовки и вентилятор помогают распределять потоки горячего воздуха по всему пространству рабочей камеры, обеспечивая равномерное приготовление блюда. Динамическая циркуляция позволяет готовить блюда на нескольких уровнях без смешивания запахов.
• Очистка паром AquaClean
• Функция AquaClean — ощутимая помощь в очистке рабочей камеры. Все, что требуется, — это налить 0,5 литра воды в противень и включить функцию AquaClean. Через 30 минут результаты видны на внутренних стенках духовки и противнях. Загрязнения и жир размягчаются, и их остается просто протереть.
• BigSpace: просторная духовка
• Готовите блюда внушительных размеров? Благодаря инновационной конструкции духовка стала больше и шире. На противнях теперь помещается больше продуктов, а современные технологии обеспечивают равномерное приготовление на всех уровнях.
• BigSurface: большая варочная поверхность
• На просторной варочной поверхности с увеличенным расстоянием между конфорками поместятся кастрюли и сковороды любого размера. Благодаря эргономичной конструкции решеток вы можете с легкостью перемещать по поверхности даже очень объемные кастрюли и при этом не опасаться за их устойчивость во время готовки.
• Чугунные решетки ProGrid
• Массивные чугунные решетки ProGrid обеспечивают стабильность посуды и придают варочной поверхности солидный вид. Чугун хорошо выдерживает высокие температуры, поэтому решетки прослужат годы и не доставят никаких хлопот.
