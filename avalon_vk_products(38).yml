<description>• Электрическая плита Gorenje GEC5B42WG Элегантный лаконичный образ модели выделяется чистым белым тоном корпуса и фурнитуры, который легко впишется в разные интерьеры. Передняя панель из крашеного металла аккуратно смотрится с эргономичными поворотными переключателями белого цвета, а стеклянная вставка на дверце добавляет лёгкости и современного характера.
• Варочная поверхность выполнена из чёрно-белой стеклокерамики без крышки, что обеспечивает быстрый доступ к четырём спиральным конфоркам и подчёркивает минималистичный стиль. Кнопки управления механические, понятные на ощупь, а электронный программатор и встроенный таймер помогают точно рассчитать время приготовления, сохраняя удобство традиционного управления. Камера объёмом 62 литра предлагает просторную рабочую зону BigSpace, дополненную большой полезной площадью SuperSize/BigSurface, чтобы готовить крупные блюда без ограничений.
• Уникальная форма HomeMADE Plus воспроизводит традиционные процессы запекания, а вентиляционная технология MultiAir равномерно распределяет тепло, создавая хрустящую корочку снаружи и мягкую структуру внутри. В арсенале находятся 16 режимов, включая классический нагрев, верхний и нижний нагрев, контактный и кольцевой вентиляторный режимы, сочетания с работой вентилятора, малый и большой гриль, режим для пиццы, функцию FrozenBake для выпечки из мороженого теста, интенсивное запекание AirFry и быстрая предварительная раскрутка температуры. Практичность подчёркнута деталями: внутренняя поверхность покрыта износостойкой эмалью SilverMatte, что облегчает уход и защищает металл. Для очистки используется паровая система AquaClean, которая размягчает загрязнения и упрощает удаление остатков пищи. Внутри предусмотрено внутреннее освещение, рельефные направляющие для листов и противней, глубокий эмалированный противень и решётка для гриля.
• Дверца Compact Door оснащена двумя стеклами и одним теплоотражающим слоем, шарнир стандартный, а система открывания простая и надёжная. Габариты прибора оптимальны для компактных кухонь. Модель сочетает в себе удобство классического управления и современные функциональные решения для разнообразных рецептов, обеспечивая стабильные результаты при ежедневном использовании.
