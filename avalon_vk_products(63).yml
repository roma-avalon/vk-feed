<description>• Электромеханическая швейная машина имеет все необходимые функции для воплощения творческих идей. Для комфортной работы с большими проектами у данной модели увеличено поле шитья — 105.4×111.8 мм. Модель выполняет 25 видов строчек: можно пришить резинку с помощью эластичного зигзага, обработать края потайными или оверлочными строчками, усиленной трикотажной строчкой шить ткани стрейч, работать в технике пэчворк, используя декоративные строчки. Петля выполняется за один шаг в автоматическом режиме. Благодаря регулятору давления лапки швейная машина справится с любым видом ткани: от шифона до джинсы. Встроенный нитевдеватель облегчает заправку нити в иглу. Таблица видов строчек удобно расположена на уровне глаз рядом с регуляторами выбора строчек, длины и ширины стежка. Также, в комплекте вы найдёте карточку с подсказками, на которой изображены схемы заправки верхнюю и нижнюю нить, какую лапку использовать для выполнения определённой строчки.
