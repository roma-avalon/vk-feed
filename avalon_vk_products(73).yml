<description>• Яндекс Станция 3 — самая атмосферная умная колонка с Алисой, интерьерной эмбиент-подсветкой, впечатляющим звуком и расширенными сценариями для безопасности вашего дома. Яндекс Станция 3 мгновенно меняет атмосферу вокруг и создаёт ваше особенное пространство.
• На задней панели умной колонки находится эмбиент-подсветка, которая поддерживает 16 миллионов цветов. Выбирайте готовые световые режимы для разных поводов или настраивайте свои сценарии. Станция 3 подстроится под ваше настроение, создавая нужную атмосферу.
• Светомузыка: подсветка может переливаться и пульсировать в такт любимым песням — математические модели анализируют музыку в реальном времени и подстраивают под неё анимацию. Просто скажите: «Алиса, включи режим Светомузыка»
• Стробоскоп: зажигайте, как на рейве — в режиме Стробоскопа яркие вспышки света будут совпадать с ритмом музыки и создавать
• атмосферу танцпола у вас дома.
• Свеча: подсветка наполнит комнату тёплым жёлто-оранжевым светом, и Алиса включит приятные звуки потрескивания камина.
• И другие режимы: в настройках Станции 3 можно найти подходящий световой режим для разных ситуаций
