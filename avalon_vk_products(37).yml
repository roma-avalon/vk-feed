<description>• Откройте для себя идеальную чистоту с Grundig VCR 8430. Этот робот-пылесос сочетает в себе лазерную навигацию, влажную уборку и дистанционное управление через мобильное приложение, обеспечивая максимальную точность и эффективность уборки. Благодаря персонализации настроек, Grundig VCR 8430 адаптируется под ваши потребности, гарантируя безупречную чистоту в каждом уголке вашего дома.
• Эффективная уборка на любом покрытии
• Высокая мощность всасывания 5000 Па*, автоопределение типа напольного покрытия и 4 режима работы позволяют роботу-пылесосу одинаково эффективно устранять пыль, шерсть домашних питомцев и другие загрязнения как на ковровых, так и на твёрдых покрытиях.
• *Данная мощность доступна в режиме &quot;Турбо&quot;
• Дистанционное
• управление
• Все настройки всегда у вас под рукой, прямо в вашем смартфоне. Управляйте чистотой в доме так, как вам удобно: удаленно – с помощью приложений HomeDirect и &quot;Умный дом&quot; или голосом – с использованием Алисы.
• Лазерная навигация
• Работа устройства начинается со сканирования помещения на 360°, создания детальной карты и ее запоминания. На основании полученных данных робот-пылесос сам построит оптимальный маршрут для уборки в необходимой части дома. Всего доступно создание до 5 карт.
• Персонализация
• настроек
• В приложении HomeDirect вы можете сохранить свои настройки для всего помещения или каждой зоны в отдельности, редактировать созданные карты, добавлять виртуальные стены, настраивать режимы работы, регулировать уровень мощности, настроить график работы и многое другое.
• Влажная уборка
• 3 режима работы и возможность контролировать уровень подачи воды обеспечивают эффективную влажную уборку, независимо от уровня загрязнений и типа напольного покрытия, будь то плитка, ламинат или паркет. Резервуар для воды, объемом 300 мл, позволяет без труда проводить полноценную уборку квартиры и даже дома.
• Автоматическая подзарядка и автономность
• Пылесос работает до 4 часов без подзарядки и самостоятельно возвращается на станцию, когда заряд заканчивается. После подзарядки он начинает уборку с того места, где остановился.
• Защита от падений
• Встроенный датчик защиты от падений позволяет пылесосу обнаруживать лестницы, предотвращая падение со ступеней. Благодаря этому, его можно использовать даже для уборки вторых и третьих этажей в частных домах и коттеджах.
