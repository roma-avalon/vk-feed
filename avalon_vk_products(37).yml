<description>• Робот-пылесос Dreame C9 — оптимальное сочетание характеристик и цены. Вы получаете отличное качество уборки и не переплачиваете за ненужный функционал. Dreame C9 отлично собирает весь мусор, может протереть пол влажной салфеткой, на одной зарядке уберет 3-4 комнаты. Удобное приложение позволяет выбрать зону для уборки, настроить индивидуальное расписание, создать виртуальные стены и запретные зоны. Пылесос шагает через порожки и избегает лестниц.LiDAR робота-пылесоса позволяет ему определять не только препятствия перед ним, но и высоту предметов, под которыми он проходит. Умная навигация сканирует окружающее пространство и выстраивает оптимальный маршрут. Конструкция щетки для уборки имеет специальные выемки, которые препятствуют наматыванию волос на ролик.Dreame C9 получил встроенный аккумулятор емкостью 2600 мАч, он позволяет роботу убирать на протяжении 90 минут без подзарядки. Если батарея сядет в процессе уборки, то робот вернется на базу, а после зарядки продолжит с того места, на котором остановился. Ёмкость пылесборника 570 мл, прозрачный контейнер позволяет увидеть его наполнение без извлечения из корпуса пылесоса. Многоразовая салфетка для влажной уборки поможет протереть пыль и оттереть нестойкие пятна. Три уровня влажности салфетки позволяют выбрать подходящий режим для каждого типа покрытия. Робот-пылесос не распознает ковры, но в приложении можно запретить заезд на них во время влажной уборки. В приложении Dreame можно настроить режим работы, выбрать комнату для уборки, задать расписание или поставить виртуальные стены для ковров, мисок животных и др. Специальные датчики, расположенные снизу пылесоса, обнаруживают перепад высот и предотвращают падение робота с лестниц. Большие подвижные ролики позволяют пылесосу преодолевать порожки высотой до 2 см.
