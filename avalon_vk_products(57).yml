• Мощный и емкий портативный внешний аккумулятор повербанк Prodige 60000 mAh с поддержкой быстрой зарядки способен заряжать до 5 устройств одновременно. Power bank имеет 2 USB разъема, 2 Type-C, и 1 - Lightning. Очень ёмкий аккумулятор, ёмкость составляет 60000 mAh, что позволяет подзаряжать оборудование в длительных походах когда нет доступа к электросети. Запаса энергии хватает для полного заряда 8 смартфонов, нескольких планшетов, цифрового фотоаппарата и других мобильных устройств которые Вы взяли в поход. Аккумулятор поддерживает технологию быстрой зарядки, а также оборудован системой защиты для безопасной зарядки подключенных устройств. Цифровой дисплей отображается текущий уровень заряда аккумулятора, это очень удобно, Вы всегда знаете сколько энергии осталось и когда следует подзарядить аккумулятор. На задней панели устройства расположен LED-фонарик для использования в темное время суток. Благодаря передовой системе безопасности, аккумулятор стабилизирует разрядное напряжение и обеспечивают защиту от короткого замыкания, гарантируя безопасную и эффективную работу устройств. Представленная модель оснащена входами: Type-C, это значит, что вы свободно сможете подзаряжать сам аккумулятор тем кабелем, которым заряжаете свой смартфон. Порт Type-C имеет двухстороний заряд, как на вход, так и на выход. По-настоящему прочный корпус из поликарбоната защитит внутренние элементы от повреждений, что гарантирует длительный срок эксплуатации. Специальный кожаный ремешок на руку удобен для переноски и не позволит случайно выронить power bank. Технические характеристики по напряжениям и токам указали на фотографиях.</description>
