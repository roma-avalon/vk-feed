<description>• Внешний аккумулятор QS-30 не даст Вашему смартфону превратиться в кирпич! Компактный аккумулятор большой емкости удобен в ежедневном использовании, поддерживает современные технологии зарядки и точно покажет, сколько заряда осталось в процентах.
• У повербанка QS-30 пластиковый корпус с бархатистым напылением софт-тач. На верхней части корпуса расположен яркий LED-экран, на котором в процентах отображается уровень заряда устройства.
• Модель может одновременно заряжать три подключенных устройства. Для этого у Olmio QS-30 есть два USB-разъема и один разъем Type-C. Через разъем Type-C можно заряжать не только совместимые устройства, но и сам внешний аккумулятор. Емкости 30000 mAh хватит для того, чтобы зарядить iPhone 12 7 раз, Samsung Galaxy S21 Ultra 4 раза, Samsung Galaxy Z Fold2 4 раза, Xiaomi Mi 11 4 раза, Huawei Mate 40 Pro 5 раз.
• Внешний аккумулятор QS-30 поддерживает технологию быстрой зарядки. При этом устройство не только быстро заряжает гаджеты с поддержкой Quick Charge, но и само быстро заряжается. На корпусе модели есть индикатор быстрой зарядки.
• А благодаря поддержке технологии Power Delivery, повербанк способен передавать через разъем Type-C ток с максимальной выходной мощностью 20 Ватт. Это значит, что устройство подойдет даже для заряда последних моделей MacBook и других ноутбуков. Например, MacBook, MacBook Pro и MacBook Air
• Сам аккумулятор можно зарядить от любого удобного для Вас разъема из самых популярных. Поддерживаются lightning, MicroUSB и USB Type-C
• Внешний аккумулятор QS-30 оснащен встроенной защитой от перегрева, короткого замыкания и перегрузок. Продается с гарантией производителя.
