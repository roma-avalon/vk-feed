<description>• Внешний аккумулятор Ugreen PB550 (55996B) с емкостью АКБ 20000mAh предлагает идеальное решение для зарядки ваших устройств в любое время и в любом месте. Оснащённый функцией быстрой зарядки, он поддерживает технологии Power Delivery и предоставляет мощность до 67W, что позволяет вам быстро восстановить заряд вашего смартфона, планшета или другого устройства.
