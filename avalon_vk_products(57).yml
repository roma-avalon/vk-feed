• Описание
• Мощный и емкий портативный внешний аккумулятор повербанк Prodige 80000 mAh с поддержкой быстрой зарядки способен заряжать до 6 устройств одновременно. Очень ёмкий, ёмкость составляет 80000 mAh, что позволяет подзаряжать оборудование в длительных походах когда нет доступа к электросети. Запаса энергии хватает для полного заряда десяти смартфонов, нескольких планшетов, цифрового фотоаппарата и других мобильных устройств которые Вы взяли в поход. Аккумулятор поддерживает технологию быстрой зарядки, а также оборудован системой защиты для безопасной зарядки подключенных устройств. Цифровой дисплей отображается текущий уровень заряда аккумулятора, это очень удобно, Вы всегда знаете сколько энергии осталось и когда следует подзарядить аккумулятор. На задней панели устройства расположен LED-фонарик для использования в темное время суток. Благодаря передовой системе безопасности, аккумулятор стабилизирует разрядное напряжение и обеспечивают защиту от короткого замыкания, гарантируя безопасную и эффективную работу устройств. Представленная модель оснащена входами: Type-C, USB, Lightning. Это значит, что вы свободно сможете подзаряжать сам аккумулятор тем кабелем, которым заряжаете свой смартфон. Порт Type-C имеет двухстороний заряд, как на вход, так и на выход. По-настоящему прочный корпус из поликарбоната защитит внутренние элементы от повреждений, что гарантирует длительный срок эксплуатации. Специальный кожаный ремешок на руку удобен для переноски и не позволит случайно выронить power bank. Технические характеристики по напряжениям и токам указали на фотографиях.</description>
