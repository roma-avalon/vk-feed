• Высокая ёмкость 30000mAh – обеспечивает питание для многократной зарядки устройств. Идеально подходит для длительных поездок, кемпинга или когда вам нужен надёжный резервный источник питания на несколько дней
• Универсальная поддержка быстрой зарядки – быстро заряжайте свои устройства с помощью новейших протоколов быстрой зарядки. Экономьте время и оставайтесь продуктивными благодаря выходной мощности до 22.5W.
• Множество входных/выходных портов – заряжайте пауэрбанк через Type-C или Micro-USB и заряжайте до трёх устройств одновременно (1 × Type-C + 2 × USB-A). Отлично подходит для семей, компаний или когда несколько гаджетов нуждаются в зарядке одновременно.
• Усовершенствованная система безопасности – многоуровневая защита и интеллектуальное распознавание IC предотвращают перегрев, перезарядку и короткое замыкание. Обеспечивает безопасную зарядку для 99% устройств, заряжаемых через USB.
• LED индикатор уровня заряда – проверяйте остаток заряда батареи коротким нажатием кнопки питания. Четыре светодиода показывают точный уровень заряда. Зелёный индикатор быстрой зарядки подтверждает активную быструю зарядку PD/QC.
• Прочный, премиальный дизайн – корпус из ABS + PC с пониженной горючестью и текстурой под кожу обеспечивает улучшенный захват, устойчивость к царапинам и изысканный внешний вид. Создан для долгой службы при повседневном использовании и в поездках.
• ▸ Технические характеристики
• Параметр Значение
• Ёмкость: 30000mAh, 111Wh, номинальная ёмкость: 18000mAh (5V TYP 2A).
• Вход:
• 1 × Type-C порт – 5V / 3A, 9V / 2A, 12V / 1.5A – 18W.
• 1 × Micro-USB порт – 5V / 2A, 9V / 2A, 12V / 1.5A – 18W.
• Выход:
• 1 × Type-C порт – 5V / 3A, 9V / 2.22A, 12V / 1.67A – 20W.
• 2 × USB-A порта – 5V / 3A, 9V / 2A, 10V / 2.25 (SCP), 12V / 1.5A – 22.5W каждый.
• Общий выход: 5V / 2A – 10W (макс).
• Быстрая зарядка: Поддержка PD3.0 / PD20W / QC3.0 / QC2.0 / FCP / SCP / AFC и других протоколов быстрой зарядки.
• Индикация: LED индикатор уровня заряда, зелёный индикатор быстрой зарядки.
• Уровень заряда отображается четырьмя светодиодами:
• ● ○ ○ ○ &gt; 1 – 25%,
• ● ● ○ ○ &gt; 26 – 50%,
• ● ● ● ○ &gt; 51 – 75%,
• ● ● ● ● &gt; 76 – 100%.
• Материал: ABS + PC огнеупорный корпус, литий-ионный полимерный аккумулятор, электронные компоненты.
• Размер: 145 × 69.5 × 41.5мм.
• Вес: 590г.</description>
