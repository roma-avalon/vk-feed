<description>• Телевизор NORDFROST Y 3201 HD-R в стильном дизайне без рамки и черном корпусе гармонично впишется в любой интерьер, а благодаря умным технологиям и прекрасному качеству цветопередачи погрузит в невероятное удовольствие от просмотра ваших любимых передач, фильмов и сериалов.
• Телевизор оснащен экраном HD Ready с диагональю 32 дюйма, с максимальным разрешением 1366х768 пикселей и соотношением сторон 16:9.
• LED – экран с использованием инновационных технологий передает чистую и красочную картинку с отчетливо видимыми мельчайшими деталями. Цвета передаются с максимальной яркостью 200 кд/м2, контрастностью 1200:1 и углом обзора 178 градусов. Высокое разрешение и потрясающая цветовая гамма создают эффект полного погружения.
• Два мощных интегрированных стереодинамика мощностью 16 Вт с технологией Dolby Audio наполнят ваш дом четким, объемным и богатым звуком.
• Модель поддерживает технологию Smart TV на платформе Yandex со встроенным голосовым управлением и помощником Алисой. Чтобы управлять телевизором, нужно нажать кнопку на пульте дистанционного управления и произнести голосовой запрос. Алиса поможет найти фильм или сериал, покажет прогноз погоды или откроет необходимые настройки.
• Много места для любимых приложений - большой объем оперативной памяти -1 Гб, а также 8 Гб флеш-памяти.
• Современные технологии беспроводной системы связи Wi-Fi и Bluetooth легко подключают любые устройства, передают файлы и информацию со смартфонов, планшетов, ноутбуков.
• В телевизоре есть разъемы USB и HDMI для подключения игровых приставок, умных колонок, мониторов и других устройств .
• Модель полностью поддерживает все современные стандарты подключений: DVB-T/T2/C/S/S2. Динамическое шумоподавление повышает качество цветопередачи и четкости данных со съемных носителей.
• Преимущества:
• - экран HD Ready;
• - диагональ 32 дюйма;
• - Smart TV на платформе Yandex;
• - Bluetooth пульт с голосовым управлением;
• - безрамочный дизайн.
• Телевизоры NORDFROST – это максимум погружения в изображение и безграничное удовольствие от просмотра!
