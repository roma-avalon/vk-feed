<stock>1</stock>
<description>• Особенности:
• MD-110 это компактное SIGNATURE combo 3 в 1 на магнитном кронштейне
• Устройство Artway MD-110 не загораживает обзор водителя, занимает совсем немного места за зеркалом заднего вида и больше напоминает видеорегистратор. Однако, это полноценное комбо-устройство, которое выполняет функции съемки, детектирования радарных комплексов и оповещения по базе камер GPS
• Разрешение записи видео видеорегистратором: Super HD (2304х1296) в 30 к/с.
• Благодаря продвинутой матрице возможно добиться максимального качества картинки и зафиксировать все необходимые детали на дороге: номера автомобилей, дорожные знаки и сигналы светофора, а также обстоятельства и происшествия. Видео такого высокого качество позволит Вам доказать свою невиновность в случае судебных разбирательств.
• Сигнатурная технология позволяет отсекать ложные срабатывания
• При включении режима радар-детектора SMART устройство определяет не только наличие радарного комплекса на пути, но и его тип: кречет, вокорт, кордон и др.
• Работа автомобильного видеорегистратора осуществляется, зачастую, в сложных условиях недостаточной освещенности, что может привести к засветке изображения, в том числе номерных знаков.
• Ещё одной ситуацией, способной испортить видеокартинку, является съёмка дороги в вечернее или ночное время и ослепление камеры регистратора фарами встречных автомобилей. Для преодоления данной проблемы существует встроенная функция HDR (англ HighDynamicRange расширенный динамический диапазон). Она обеспечивает особый режим съёмки, при котором камера одновременно делает три кадра с разной выдержкой. Дальше происходит совмещение этих трёх кадров в один. Получающийся кадр обладает положительными сторонами каждого из трёх исходных и в то же время лишён их недостатков. Обычные видеорегистраторы не способны сделать качественное видео в подобных условиях. В модели ARTWAY MD-110 функция HDR максимально сбалансирует кадры видео и сделает возможным их просмотр. Изображение будет идеальным при любой освещенности.
• Устройство крепится на магнитный кронштейн.
• Моментальная установка или снятие устройства обеспечивается за счет быстросъемного магнитного крепления Мощные неодимовые магниты надежно фиксируют видеорегистратор и крепко удерживают его в процессе движения, гарантируя прочное соединение вне зависимости от качества дорожного полотна.
