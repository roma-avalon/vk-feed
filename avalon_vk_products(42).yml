<description>• Мощный паровой утюг GALAXY LINE с вертикальным отпариванием и керамической подошвой станет незаменимым помощником в уходе за вещами после стирки.
• Мощность 3200 Вт обеспечивает быстрый нагрев и эффективное отглаживание и отпаривание тканей.
• Наличие функции вертикального отпаривания позволит отпаривать одежду, не снимая с вешалки, а также тюль или шторы, не снимая с карниза.
• Керамическое покрытие EasyGlide равномерно распределяет тепло, за счет этого утюг легко скользит по плотным тканям, не допуская пригорания волокон. Высокопрочная керамическая подошва не боится царапин и легко очищается.
• Сильный удар горячим паром обеспечивает дополнительную мощность для более глубокого проникновения в ткань и поможет разгладить складки и заломы на плотных и сильно мнущихся тканях: джинсе, льне, вельвете.
• Терморегулятор позволяет подобрать оптимальный режим для глажения того или иного вида ткани: щадящий режим подойдет для синтетики, средний нагрев хорошо справится с шелком и шерстью, а максимальная температура — с хлопком и льном.
• Регулировка подачи пара позволяет установить желаемую мощность отпаривания ткани в зависимости от ее типа или полностью перекрыть подачу пара.
• Функция автооключения сделает процесс глажки удобным и безопасным. Утюг отключается автоматически через 30 секунд в горизонтальном положении, через 8 минут в вертикальном положении.
• Функция &quot;Самоочистка&quot; очищает нагревательный элемент и выводит накипь через отверстия в подошве утюга. Благодаря этому срок службы утюга увеличивается в 3-4 раза даже при использовании жесткой воды.
• Функция &quot;Антикапля&quot; предотвращает протекание воды и позволяет разглаживать на низких температурах даже самые деликатные ткани без риска повредить их.
• Встроенная система защиты от известковых отложений предотвращает засорение системы выпуска пара и значительно продлевает срок службы прибора.
• Зауженная форма носика позволяет прогладить самые узкие и труднодоступные участки, например, манжеты и участки между пуговицами.
• Благодаря паровому утюгу GALAXY LINE глажка различных типов тканей станет быстрой, легкой и приятной задачей даже тогда, когда под рукой нет гладильной доски.
