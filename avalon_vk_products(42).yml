• Торговая марка MIE представляет новую разработку в области паровой гладильной техники- паровой пресс MIE ROMEO III.
• Паровой гладильный пресс позволяет разглаживать текстильные изделия быстро и качественно, не прилагая при этом больших физических усилий. Глажение паровым прессом избавляет от нагрузки на руки, ноги и спину, работать с прессом можно сидя и стоя.
• Пресс MIE ROMEO III без труда разглаживает сложенные в несколько слоев прямые вещи – скатерти, полотенца, постельное белье. Рубашки, брюки, футболки и прочие вещи располагаются на платформе пресса и отглаживаются в 2–3 приема.
• Превосходный результат глажения достигается благодаря некоторым особенностям пресса MIE ROMEO III:
